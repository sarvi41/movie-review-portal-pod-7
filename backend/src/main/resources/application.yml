spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/movie_review_portal
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      indent_output: true
flyway:
  enabled: true
  locations: classpath:db/migration

server:
  port: 8080

movie-review-portal:
  jwt:
    secret: CHANGE_ME
    expiration-ms: 3600000
