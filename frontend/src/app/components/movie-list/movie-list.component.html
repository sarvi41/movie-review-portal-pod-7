<div class="movie-list">
  <div class="toolbar">
    <h2>Movies</h2>
  </div>

  <div *ngIf="loading" class="loading-container">
    <mat-progress-spinner mode="indeterminate"></mat-progress-spinner>
  </div>

  <div *ngIf="!loading && movies.length === 0" class="empty-state">
    <p>No movies available yet.</p>
  </div>

  <div class="movies-grid">
    <mat-card *ngFor="let movie of movies" class="movie-card">
      <mat-card-header>
        <mat-card-title>{{ movie.title }}</mat-card-title>
        <mat-card-subtitle
          >{{ movie.releaseYear }} • {{ movie.director }}</mat-card-subtitle
        >
      </mat-card-header>

      <mat-card-content>
        <p>{{ movie.description }}</p>
        <div class="movie-meta">
          <mat-chip-list>
            <mat-chip color="primary" selected
              >{{ movie.averageRating | number: "1.1-2" }} ★</mat-chip
            >
            <mat-chip *ngFor="let genre of movie.genres">{{ genre }}</mat-chip>
          </mat-chip-list>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button
          mat-stroked-button
          color="primary"
          (click)="viewDetails(movie.id)"
        >
          View details
        </button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
